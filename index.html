<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPA Library</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont,Arial,sans-serif;
}

body{
    background:#0b0f17;
    color:#fff;
}

/* HEADER */
header{
    position:sticky;
    top:0;
    z-index:100;
    display:flex;
    flex-direction:column;
    gap:10px;
    padding:15px 20px;
    background:rgba(15,18,28,0.75);
    backdrop-filter: blur(12px);
    border-bottom:1px solid rgba(255,255,255,0.06);
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:22px;
    font-weight:700;
    color:#7ab7ff;
}

input{
    width:260px;
    padding:10px 14px;
    border-radius:12px;
    border:none;
    outline:none;
    background:#151a2a;
    color:white;
}

/* CATEGORY BAR */
.categories{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.cat{
    padding:8px 12px;
    border-radius:10px;
    background:#151a2a;
    border:1px solid rgba(255,255,255,0.06);
    cursor:pointer;
    font-size:12px;
    transition:0.2s;
}

.cat:hover{
    transform:scale(1.05);
    border-color:#7ab7ff;
}

.cat.active{
    background:#7ab7ff;
    color:#000;
    font-weight:600;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
    gap:18px;
    padding:25px;
}

/* CARD */
.card{
    background:linear-gradient(145deg,#141a2a,#0f1422);
    border:1px solid rgba(255,255,255,0.06);
    border-radius:18px;
    padding:15px;
    cursor:pointer;
    transition:0.25s;
    opacity:0;
    transform:translateY(15px);
    animation:fadeIn 0.4s forwards;
}

@keyframes fadeIn{
    to{opacity:1;transform:translateY(0);}
}

.card:hover{
    transform:translateY(-10px) scale(1.03);
    box-shadow:0 15px 35px rgba(0,0,0,0.6),
               0 0 20px rgba(122,183,255,0.15);
}

.top{
    display:flex;
    gap:12px;
    align-items:center;
}

.card img{
    width:58px;
    height:58px;
    border-radius:14px;
}

h3{font-size:15px;}
.small{font-size:12px;color:#9aa4b2;}

.meta{
    margin-top:12px;
    font-size:12px;
    color:#b7c0d1;
    display:flex;
    flex-direction:column;
    gap:4px;
}

/* MODAL */
.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    display:none;
    justify-content:center;
    align-items:center;
    backdrop-filter: blur(10px);
}

.modal.show{display:flex;}

.modal-content{
    width:90%;
    max-width:720px;
    background:#121826;
    border-radius:20px;
    padding:22px;
    animation:pop 0.25s forwards;
    position:relative;
}

@keyframes pop{
    from{transform:scale(0.85);opacity:0;}
    to{transform:scale(1);opacity:1;}
}

.app-header{
    display:flex;
    gap:15px;
    align-items:center;
    margin-bottom:18px;
}

.app-header img{
    width:78px;height:78px;border-radius:18px;
}

.app-title h2{margin:0;font-size:20px;}
.app-title .sub{font-size:13px;color:#9aa4b2;}

.badge-row{
    display:flex;
    gap:8px;
    margin-top:8px;
    flex-wrap:wrap;
}

.badge{
    font-size:11px;
    padding:4px 8px;
    border-radius:8px;
    background:#1b2233;
    color:#cbd5e1;
}

.section{margin-top:18px;}
.section h3{color:#7ab7ff;font-size:14px;}

.info{
    font-size:13px;
    color:#cbd5e1;
    line-height:1.6;
}

.download-btn{
    display:block;
    text-align:center;
    margin-top:18px;
    background:linear-gradient(90deg,#4da3ff,#7ab7ff);
    padding:12px;
    border-radius:14px;
    color:white;
    text-decoration:none;
    font-weight:600;
}
</style>
</head>

<body>

<header>
<div class="topbar">
    <div class="logo">IPA Library</div>
    <input id="search" placeholder="Search apps...">
</div>

<div class="categories" id="catBar"></div>
</header>

<div class="grid" id="grid"></div>

<div class="modal" id="modal">
<div class="modal-content">
<div id="modalBody"></div>
</div>
</div>

<script>

const APPS_URL = "apps.json";
const CATEGORIES_URL = "categories.json";

let apps = {};
let categories = {};
let currentCategory = "Emulators";

function formatSize(bytes){
    if(!bytes) return "Unknown";
    return (bytes / 1024 / 1024).toFixed(1) + " MB";
}

async function loadData(){
    const [appsRes, catRes] = await Promise.all([
        fetch(APPS_URL),
        fetch(CATEGORIES_URL)
    ]);

    const appsData = await appsRes.json();
    categories = await catRes.json();

    // convert apps array → map by id
    appsData.forEach(app => {
        apps[app.id] = app;
    });

    buildCategories();
    render();
}

function buildCategories(){
    const bar = document.getElementById("catBar");
    bar.innerHTML = "";

    Object.keys(categories).forEach(cat=>{
        const btn = document.createElement("div");
        btn.className = "cat" + (cat===currentCategory?" active":"");
        btn.innerText = cat;

        btn.onclick = ()=>{
            currentCategory = cat;
            document.querySelectorAll(".cat").forEach(b=>b.classList.remove("active"));
            btn.classList.add("active");
            render();
        };

        bar.appendChild(btn);
    });
}

function render(){
    const grid = document.getElementById("grid");
    grid.innerHTML = "";

    let ids = categories[currentCategory] || [];

    const q = document.getElementById("search").value.toLowerCase();

    ids = ids
        .map(id => apps[id])
        .filter(app => app)
        .filter(app =>
            app.name.toLowerCase().includes(q) ||
            (app.subtitle||"").toLowerCase().includes(q)
        );

    ids.forEach((app,i)=>{

        const latest = app.versions?.[0];

        const card = document.createElement("div");
        card.className = "card";
        card.style.animationDelay = `${i*0.03}s`;

        card.innerHTML = `
            <div class="top">
                <img src="${app.iconURL}">
                <div>
                    <h3>${app.name}</h3>
                    <div class="small">${app.subtitle||""}</div>
                </div>
            </div>

            <div class="meta">
                <div>👤 ${app.developerName}</div>
                <div>📦 v${latest?.version}</div>
                <div>💾 ${formatSize(latest?.size)}</div>
            </div>
        `;

        card.onclick = ()=>openApp(app);
        grid.appendChild(card);
    });
}

function openApp(app){
    const latest = app.versions?.[0];

    document.getElementById("modal").classList.add("show");

    document.getElementById("modalBody").innerHTML = `
        <div class="app-header">
            <img src="${app.iconURL}">
            <div class="app-title">
                <h2>${app.name}</h2>
                <div class="sub">${app.subtitle||""}</div>

                <div class="badge-row">
                    <div class="badge">v${latest?.version}</div>
                    <div class="badge">${formatSize(latest?.size)}</div>
                </div>
            </div>
        </div>

        <div class="section">
            <h3>Description</h3>
            <div class="info">${app.localizedDescription}</div>
        </div>

        <a class="download-btn" href="${latest?.downloadURL}" target="_blank">
            Download IPA
        </a>
    `;
}

document.getElementById("search").addEventListener("input", render);

loadData();

</script>

</body>
</html>
