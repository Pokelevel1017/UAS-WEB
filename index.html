<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Universal App Store</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont,Arial,sans-serif;
}

body{
    background:#0b0f17;
    color:#fff;
}

/* HEADER */
header{
    position:sticky;
    top:0;
    z-index:100;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:16px 22px;
    background:rgba(15,18,28,0.7);
    backdrop-filter: blur(20px);
    border-bottom:1px solid rgba(255,255,255,0.06);
}

.logo{
    font-size:20px;
    font-weight:700;
    color:#7ab7ff;
}

.right-tools{
    display:flex;
    gap:10px;
    align-items:center;
}

input{
    width:260px;
    padding:10px 12px;
    border-radius:12px;
    border:none;
    outline:none;
    background:#151a2a;
    color:white;
    transition:0.25s ease;
}

input:focus{
    box-shadow:0 0 0 2px rgba(122,183,255,0.18);
    transform:translateY(-1px);
}

.repo-launch{
    padding:10px 14px;
    border-radius:12px;
    border:none;
    background:#1b2233;
    color:white;
    font-weight:600;
    cursor:pointer;
    transition:0.25s ease;
}

.repo-launch:hover{
    transform:translateY(-2px);
    background:#222b3f;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
    gap:16px;
    padding:22px;
}

/* CARD */
.card{
    background:linear-gradient(145deg,#141a2a,#0f1422);
    border:1px solid rgba(255,255,255,0.06);
    border-radius:16px;
    padding:14px;
    cursor:pointer;

    opacity:0;
    transform:translateY(18px) scale(0.97);
    animation:cardIn 0.5s cubic-bezier(0.2,0.8,0.2,1) forwards;

    transition:0.25s ease;
}

.card:hover{
    transform:translateY(-6px) scale(1.01);
    border-color:rgba(122,183,255,0.25);
    box-shadow:0 12px 35px rgba(0,0,0,0.4);
}

@keyframes cardIn{
    to{
        opacity:1;
        transform:translateY(0) scale(1);
    }
}

/* CARD CONTENT */
.card-top{
    display:flex;
    gap:12px;
    align-items:center;
}

.card-icon{
    width:54px;
    height:54px;
    border-radius:14px;
    object-fit:cover;
}

.card-title{
    display:flex;
    flex-direction:column;
    gap:2px;
}

.card-title h3{
    font-size:14.5px;
}

.card-title .sub{
    font-size:11.5px;
    color:#9aa4b2;
}

.card-meta{
    margin-top:10px;
    padding-top:8px;
    border-top:1px solid rgba(255,255,255,0.05);
    display:flex;
    flex-direction:column;
    gap:3px;
    font-size:11.5px;
    color:#b7c0d1;
}

/* MODAL */
.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.65);
    display:none;
    justify-content:center;
    align-items:center;
    backdrop-filter: blur(14px);
    padding:18px;
}

.modal.show{
    display:flex;
}

.modal-content{
    width:100%;
    max-width:760px;
    background:#121826;
    border-radius:18px;
    padding:20px;
    position:relative;
}

/* CLOSE */
.close{
    position:absolute;
    top:10px;
    right:14px;
    font-size:22px;
    cursor:pointer;
    color:#aaa;
}

.close:hover{
    color:white;
}

/* DOWNLOAD */
.download{
    display:block;
    margin-top:16px;
    padding:11px;
    text-align:center;
    border-radius:12px;
    background:linear-gradient(90deg,#4da3ff,#7ab7ff);
    color:white;
    font-weight:600;
    text-decoration:none;
}

/* BADGES */
.badges{
    margin-top:8px;
    display:flex;
    flex-wrap:wrap;
    gap:6px;
}

.badge{
    background:#1b2233;
    padding:4px 9px;
    border-radius:10px;
    font-size:10.5px;
    color:#cbd5e1;
}

/* REPO */
.repo-list{
    margin-top:14px;
    display:flex;
    flex-direction:column;
    gap:10px;
}

.repo-list button{
    padding:12px;
    border-radius:12px;
    border:none;
    cursor:pointer;
    background:#1b2233;
    color:#dbe6ff;
    transition:0.2s ease;
}

.repo-list button:hover{
    background:rgba(122,183,255,0.14);
}

/* TOAST */
.toast{
    position:fixed;
    bottom:18px;
    left:50%;
    transform:translateX(-50%);
    background:#1b2233;
    padding:10px 14px;
    border-radius:12px;
    font-size:12px;
    opacity:0;
    transition:0.3s;
}

.toast.show{
    opacity:1;
    transform:translateX(-50%) translateY(-4px);
}

/* =========================
   📱 MOBILE FIX (ADDED)
========================= */
@media (max-width: 768px){

    header{
        flex-direction:column;
        align-items:stretch;
        gap:10px;
    }

    .right-tools{
        width:100%;
        display:flex;
        gap:10px;
    }

    input{
        width:100%;
        flex:1;
    }

    .repo-launch{
        white-space:nowrap;
    }

    .grid{
        grid-template-columns:repeat(2,1fr);
        gap:12px;
        padding:14px;
    }

    .card{
        padding:12px;
    }

    .card-icon{
        width:48px;
        height:48px;
    }

    .card-title h3{
        font-size:13px;
    }

    .card-title .sub{
        font-size:10.5px;
    }

    .card-meta{
        font-size:10.5px;
    }

    .modal-content{
        width:95%;
        padding:16px;
        border-radius:14px;
    }

    .download{
        padding:10px;
        font-size:14px;
    }
}

</style>
</head>

<body>

<header>
<div class="logo">Universal App Store</div>

<div class="right-tools">
<input id="search" placeholder="Search apps...">
<button class="repo-launch" onclick="openRepo()">Add Repo</button>
</div>
</header>

<div class="grid" id="grid"></div>

<div class="modal" id="modal">
<div class="modal-content" id="modalContent"></div>
</div>

<div class="toast" id="toast"></div>

<script>

const API="https://pokelevel1017.github.io/UAS/apps.json";
let apps=[];

function toast(msg){
    const t=document.getElementById("toast");
    t.textContent=msg;
    t.classList.add("show");
    setTimeout(()=>t.classList.remove("show"),1200);
}

async function load(){
    const res=await fetch(API);
    const data=await res.json();
    apps=Array.isArray(data)?data:data.apps||data.data||[];
    render(apps);
}

function render(list){
    list=[...list].sort((a,b)=>
        (a.name||"").toLowerCase().localeCompare((b.name||"").toLowerCase())
    );

    const grid=document.getElementById("grid");
    grid.innerHTML="";

    list.forEach((app)=>{
        const v=app.versions?.[0];

        const el=document.createElement("div");
        el.className="card";

        el.innerHTML=`
        <div class="card-top">
            <img class="card-icon" src="${app.iconURL}">
            <div class="card-title">
                <h3>${app.name}</h3>
                <div class="sub">${app.subtitle||""}</div>
            </div>
        </div>

        <div class="card-meta">
            <div>👤 ${app.developerName||""}</div>
            <div>📦 v${v?.version||"?"}</div>
            <div>💾 ${(v?.size/1024/1024).toFixed(1)} MB</div>
        </div>`;

        el.onclick=()=>openApp(app);
        grid.appendChild(el);
    });
}

function openApp(app){
    const v=app.versions?.[0];

    document.getElementById("modalContent").innerHTML=`
    <div class="close" onclick="closeModal()">✕</div>

    <div style="display:flex;gap:12px;align-items:center;">
        <img src="${app.iconURL}" style="width:70px;height:70px;border-radius:16px;">
        <div>
            <h2>${app.name}</h2>
            <div style="color:#9aa4b2;font-size:12px">${app.subtitle||""}</div>

            <div class="badges">
                <div class="badge">${app.developerName||""}</div>
                <div class="badge">v${v?.version||"?"}</div>
                <div class="badge">${(v?.size/1024/1024).toFixed(1)} MB</div>
            </div>
        </div>
    </div>

    <div style="margin-top:14px;color:#cbd5e1;font-size:13px;">
        ${app.localizedDescription||""}
    </div>

    <a class="download" href="${v?.downloadURL}" target="_blank">Download IPA</a>
    `;

    document.getElementById("modal").classList.add("show");
}

function closeModal(){
    document.getElementById("modal").classList.remove("show");
}

function openRepo(){
    const url=API;

    document.getElementById("modalContent").innerHTML=`
    <div class="close" onclick="closeModal()">✕</div>

    <h2>Add Repo</h2>
    <div style="color:#9aa4b2;font-size:12px;margin-top:6px;">${url}</div>

    <div class="repo-list">

        <button onclick="toast('Added ✔ AltStore')">AltStore</button>
        <button onclick="toast('Added ✔ SideStore')">SideStore</button>
        <button onclick="toast('Added ✔ Scarlet')">Scarlet</button>
        <button onclick="toast('Added ✔ Feather')">Feather</button>
        <button onclick="toast('Added ✔ KSign')">KSign</button>
        <button onclick="toast('Added ✔ eSign')">eSign</button>

        <button onclick="
            navigator.clipboard.writeText(url)
            .then(()=>toast('Repo URL Copied ✔'))
            .catch(()=>toast('Error copying URL'))
        ">
            Copy Repo URL
        </button>

    </div>
    `;

    document.getElementById("modal").classList.add("show");
}

document.getElementById("search").addEventListener("input",e=>{
    const q=e.target.value.toLowerCase();
    render(apps.filter(a=>
        (a.name||"").toLowerCase().includes(q)||
        (a.subtitle||"").toLowerCase().includes(q)||
        (a.developerName||"").toLowerCase().includes(q)
    ));
});

load();

</script>

</body>
</html>
